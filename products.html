<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top"></nav>

<section class="products-section">
    <div class="container">
        <div class="row">
            <!-- Sidebar Filters -->
            <div class="col-lg-3 mb-4">
                <div class="filter-sidebar">
                    <h5 class="fw-bold mb-4"><i class="fas fa-filter me-2"></i>Filters</h5>
                    <form id="filterForm" onsubmit="event.preventDefault(); applyFilters();">
                        <div class="filter-group">
                            <h6>Price Range</h6>
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="number" id="minPrice" class="form-control" placeholder="Min">
                                </div>
                                <div class="col-6">
                                    <input type="number" id="maxPrice" class="form-control" placeholder="Max">
                                </div>
                            </div>
                        </div>

                        <div class="filter-group">
                            <h6>Size</h6>
                            <div id="sizeFilters"></div>
                        </div>

                        <div class="filter-group">
                            <h6>Sort By</h6>
                            <select id="sortSelect" class="form-select">
                                <option value="">Default</option>
                                <option value="price_asc">Price: Low to High</option>
                                <option value="price_desc">Price: High to Low</option>
                                <option value="rating">Highest Rated</option>
                                <option value="newest">Newest First</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-accent w-100">Apply Filters</button>
                        <button type="button" class="btn btn-outline-secondary w-100 mt-2" onclick="clearFilters()">Clear All</button>
                    </form>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0" id="pageTitle">All Products</h4>
                    <span class="text-muted" id="resultCount">0 products found</span>
                </div>
                <div class="row g-4" id="productsGrid"></div>
                <div class="text-center py-5 d-none" id="noResults">
                    <i class="fas fa-search fa-4x text-muted mb-3"></i>
                    <h4>No products found</h4>
                    <p class="text-muted">Try adjusting your filters or search query.</p>
                    <a href="products.html" class="btn btn-accent">View All Products</a>
                </div>
            </div>
        </div>
    </div>
</section>

<footer id="footer" class="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
    const allSizes = ['XS','S','M','L','XL','XXL','One Size'];

    function renderSizeFilters() {
        document.getElementById('sizeFilters').innerHTML = allSizes.map(sz => `
            <div class="filter-option">
                <input type="radio" name="size" value="${sz}" id="size_${sz}" onchange="applyFilters()">
                <label for="size_${sz}">${sz}</label>
            </div>
        `).join('');
    }

    function getFilteredProducts() {
        let result = [...products];
        const category = getParam('category');
        const query = getParam('q');
        const minPrice = document.getElementById('minPrice').value;
        const maxPrice = document.getElementById('maxPrice').value;
        const size = document.querySelector('input[name="size"]:checked')?.value;
        const sort = document.getElementById('sortSelect').value;

        if (category) {
            result = result.filter(p => p.category === category);
        }
        if (query) {
            const q = query.toLowerCase();
            result = result.filter(p => p.name.toLowerCase().includes(q) || p.description.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q));
        }
        if (minPrice) result = result.filter(p => p.price >= parseFloat(minPrice));
        if (maxPrice) result = result.filter(p => p.price <= parseFloat(maxPrice));
        if (size) result = result.filter(p => p.sizes.includes(size));

        if (sort) {
            switch(sort) {
                case 'price_asc': result.sort((a,b) => a.price - b.price); break;
                case 'price_desc': result.sort((a,b) => b.price - a.price); break;
                case 'rating': result.sort((a,b) => b.rating - a.rating); break;
                case 'newest': result.sort((a,b) => b.id - a.id); break;
            }
        }
        return result;
    }

    function renderProducts() {
        const filtered = getFilteredProducts();
        const grid = document.getElementById('productsGrid');
        const noResults = document.getElementById('noResults');
        document.getElementById('resultCount').textContent = filtered.length + ' products found';

        if (filtered.length === 0) {
            grid.innerHTML = '';
            noResults.classList.remove('d-none');
        } else {
            noResults.classList.add('d-none');
            grid.innerHTML = filtered.map(renderProductCard).join('');
        }
    }

    function applyFilters() {
        renderProducts();
    }

    function clearFilters() {
        document.getElementById('minPrice').value = '';
        document.getElementById('maxPrice').value = '';
        document.getElementById('sortSelect').value = '';
        document.querySelectorAll('input[name="size"]').forEach(el => el.checked = false);
        renderProducts();
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderSizeFilters();
        const category = getParam('category');
        const query = getParam('q');
        const title = document.getElementById('pageTitle');
        if (query) title.textContent = 'Search: ' + query;
        else if (category) {
            const cat = categories.find(c => c.name === category);
            title.textContent = cat ? cat.displayName : category;
        }
        renderProducts();
    });
</script>

</body>
</html>
