<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Shopping Cart')}"></head>
<body>

<nav th:replace="~{fragments :: navbar}"></nav>

<section class="cart-page">
    <div class="container">
        <h2 class="fw-bold mb-4">Shopping Cart <span class="text-muted fs-5" th:text="'(' + ${cartCount} + ' items)'">(0 items)</span></h2>

        <div class="row g-4" th:if="${!cartItems.isEmpty()}">
            <div class="col-lg-8">
                <div class="cart-item" th:each="item, iter : ${cartItems}">
                    <div class="cart-item-image">
                        <img th:src="${item.product.imageUrl}" th:alt="${item.product.name}">
                    </div>
                    <div class="cart-item-details">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="cart-item-title" th:text="${item.product.name}">Product Name</div>
                                <div class="cart-item-meta">
                                    <span th:if="${item.selectedSize != null}" th:text="'Size: ' + ${item.selectedSize}">Size: M</span>
                                    <span th:if="${item.selectedColor != null}" th:text="' | Color: ' + ${item.selectedColor}"> | Color: Red</span>
                                </div>
                            </div>
                            <form th:action="@{/cart/remove}" method="post" class="m-0">
                                <input type="hidden" name="index" th:value="${iter.index}">
                                <button type="submit" class="btn btn-link text-danger p-0" onclick="return confirm('Remove this item?')">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </form>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <form th:action="@{/cart/update}" method="post" class="quantity-selector m-0">
                                <input type="hidden" name="index" th:value="${iter.index}">
                                <button type="submit" name="quantity" th:value="${item.quantity - 1}" class="qty-btn" th:disabled="${item.quantity <= 1}">-</button>
                                <input type="text" th:value="${item.quantity}" class="qty-input" readonly>
                                <button type="submit" name="quantity" th:value="${item.quantity + 1}" class="qty-btn" th:disabled="${item.quantity >= 10}">+</button>
                            </form>
                            <div class="cart-item-price" th:text="'$' + ${#numbers.formatDecimal(item.total, 1, 2)}">$29.99</div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/products}" class="btn btn-outline-dark rounded-pill">
                        <i class="fas fa-arrow-left me-2"></i>Continue Shopping
                    </a>
                    <form th:action="@{/cart/clear}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger rounded-pill" onclick="return confirm('Clear entire cart?')">
                            <i class="fas fa-trash me-2"></i>Clear Cart
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="cart-summary">
                    <h4>Order Summary</h4>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="text-success">Free</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(total * 0.1, 1, 2)}">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span th:text="'$' + ${#numbers.formatDecimal(total * 1.1, 1, 2)}">$0.00</span>
                    </div>
                    <button class="btn btn-accent w-100 mt-3 py-3 fw-bold" onclick="showToast('Checkout coming soon!', 'success')">
                        Proceed to Checkout <i class="fas fa-arrow-right ms-2"></i>
                    </button>
                    <div class="text-center mt-3">
                        <i class="fab fa-cc-visa fa-2x text-muted mx-1"></i>
                        <i class="fab fa-cc-mastercard fa-2x text-muted mx-1"></i>
                        <i class="fab fa-cc-paypal fa-2x text-muted mx-1"></i>
                        <i class="fab fa-cc-apple-pay fa-2x text-muted mx-1"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="empty-cart" th:if="${cartItems.isEmpty()}">
            <i class="fas fa-shopping-bag"></i>
            <h3 class="fw-bold">Your cart is empty</h3>
            <p class="text-muted mb-4">Looks like you haven't added anything to your cart yet.</p>
            <a th:href="@{/products}" class="btn btn-accent px-5">Start Shopping</a>
        </div>
    </div>
</section>

<footer th:replace="~{fragments :: footer}"></footer>

<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
