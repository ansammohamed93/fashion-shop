<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="navbar" class="navbar navbar-expand-lg navbar-dark fixed-top"></nav>

<section class="cart-page">
    <div class="container">
        <h2 class="fw-bold mb-4">Shopping Cart <span class="text-muted fs-5" id="cartTitleCount">(0 items)</span></h2>

        <div class="row g-4" id="cartContent">
            <div class="col-lg-8" id="cartItemsCol"></div>
            <div class="col-lg-4" id="cartSummaryCol"></div>
        </div>

        <div class="empty-cart" id="emptyCart">
            <i class="fas fa-shopping-bag"></i>
            <h3 class="fw-bold">Your cart is empty</h3>
            <p class="text-muted mb-4">Looks like you haven't added anything to your cart yet.</p>
            <a href="products.html" class="btn btn-accent px-5">Start Shopping</a>
        </div>
    </div>
</section>

<footer id="footer" class="footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
    function renderCart() {
        const cart = getCart();
        document.getElementById('cartTitleCount').textContent = `(${getCartCount()} items)`;

        if (cart.length === 0) {
            document.getElementById('cartContent').classList.add('d-none');
            document.getElementById('emptyCart').classList.remove('d-none');
            return;
        }

        document.getElementById('cartContent').classList.remove('d-none');
        document.getElementById('emptyCart').classList.add('d-none');

        const itemsCol = document.getElementById('cartItemsCol');
        itemsCol.innerHTML = cart.map((item, index) => {
            const product = products.find(p => p.id === item.productId);
            if (!product) return '';
            const total = product.price * item.quantity;
            return `
                <div class="cart-item">
                    <div class="cart-item-image">
                        <img src="${product.imageUrl}" alt="${product.name}">
                    </div>
                    <div class="cart-item-details">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="cart-item-title">${product.name}</div>
                                <div class="cart-item-meta">
                                    ${item.size ? 'Size: ' + item.size : ''}
                                    ${item.color ? ' | Color: ' + item.color : ''}
                                </div>
                            </div>
                            <button class="btn btn-link text-danger p-0" onclick="removeFromCart(${index})">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div class="quantity-selector m-0">
                                <button type="button" class="qty-btn" onclick="updateCartQty(${index}, ${item.quantity - 1})" ${item.quantity <= 1 ? 'disabled' : ''}>-</button>
                                <input type="text" value="${item.quantity}" class="qty-input" readonly>
                                <button type="button" class="qty-btn" onclick="updateCartQty(${index}, ${item.quantity + 1})" ${item.quantity >= 10 ? 'disabled' : ''}>+</button>
                            </div>
                            <div class="cart-item-price">$${total.toFixed(2)}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        const total = getCartTotal();
        const tax = total * 0.1;
        const grandTotal = total + tax;

        document.getElementById('cartSummaryCol').innerHTML = `
            <div class="cart-summary">
                <h4>Order Summary</h4>
                <div class="summary-row"><span>Subtotal</span><span>$${total.toFixed(2)}</span></div>
                <div class="summary-row"><span>Shipping</span><span class="text-success">Free</span></div>
                <div class="summary-row"><span>Tax</span><span>$${tax.toFixed(2)}</span></div>
                <div class="summary-row total"><span>Total</span><span>$${grandTotal.toFixed(2)}</span></div>
                <button class="btn btn-accent w-100 mt-3 py-3 fw-bold" onclick="showToast('Checkout coming soon!', 'success')">
                    Proceed to Checkout <i class="fas fa-arrow-right ms-2"></i>
                </button>
                <div class="text-center mt-3">
                    <i class="fab fa-cc-visa fa-2x text-muted mx-1"></i>
                    <i class="fab fa-cc-mastercard fa-2x text-muted mx-1"></i>
                    <i class="fab fa-cc-paypal fa-2x text-muted mx-1"></i>
                    <i class="fab fa-cc-apple-pay fa-2x text-muted mx-1"></i>
                </div>
            </div>
        `;

        itemsCol.innerHTML += `
            <div class="d-flex justify-content-between mt-4">
                <a href="products.html" class="btn btn-outline-dark rounded-pill">
                    <i class="fas fa-arrow-left me-2"></i>Continue Shopping
                </a>
                <button class="btn btn-outline-danger rounded-pill" onclick="if(confirm('Clear entire cart?')) clearCart()">
                    <i class="fas fa-trash me-2"></i>Clear Cart
                </button>
            </div>
        `;
    }

    document.addEventListener('DOMContentLoaded', renderCart);
</script>

</body>
</html>
